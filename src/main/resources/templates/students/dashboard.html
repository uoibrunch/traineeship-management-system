<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Link to Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

    <title>Student Profile</title>
</head>

<body>

<div class="container mt-5">

    <h3>Student Profile</h3>
    <hr>

    <!-- Button to create or update profile -->
    <a href="/students/showFormForUpdate" class="btn btn-primary btn-sm mb-3">
        Update Profile
    </a>

    <!-- Student profile card -->
    <div class="card mb-3">
        <div class="card-body">
            <h5 class="card-title">
                <strong>Full Name:</strong> 
                <span th:text="${student != null ? student.studentName : 'Not Set'}"></span>
            </h5>
            <p class="card-text">
                <strong>University ID:</strong> 
                <span th:text="${student != null ? student.AM : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Preferred Location:</strong> 
                <span th:text="${student != null ? student.preferredLocation : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Interests:</strong> 
                <span th:text="${student != null ? student.interests : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Skills:</strong> 
                <span th:text="${student != null ? student.skills : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Applied for Traineeship:</strong> 
                <span th:text="${student != null && student.lookingForTraineeship ? 'Yes' : 'No'}"></span>
            </p>
        </div>
    </div>

    <a th:href="@{/logout}" class="btn btn-danger btn-sm mb-3">Logout</a>

    <div th:if="${student != null && student.assignedTraineeship != null}">
        <a th:href="@{/students/fillLogbook}" class="btn btn-warning btn-sm mb-3">Report In Logbook</a>
    </div>

    <!-- Traineeship logbook section -->
    <div class="card mb-3" th:if="${student != null && student.assignedTraineeship != null}">
        <div class="card-body">
            <h5 class="card-title">Traineeship Info</h5>
            
            <p>
                <strong>Title:</strong> 
                <span th:text="${student.assignedTraineeship.title}"></span>
            </p>
            
            <p th:if="${student.assignedTraineeship.company != null and student.assignedTraineeship.company.companyName != null}">
                <strong>Company:</strong> 
                <span th:text="${student.assignedTraineeship.company.companyName}"></span>
            </p>

            <!-- Show supervisor name if traineeship is supervised -->
            <p th:if="${student.assignedTraineeship.isSupervised}">
                <strong>Supervisor:</strong> 
                <span th:text="${student.assignedTraineeship.supervisor.professorName}"></span>
            </p>

            <!-- Display logbook entries only if there are any -->
            <div th:if="${student.assignedTraineeship.studentLogbook != null and not #lists.isEmpty(logbooks)}">
                <p><strong>Activities:</strong></p>
                <table class="table table-bordered">
                    <thead class="thead-dark">
                        <tr>
                            <th style="width: 60px; text-align: center;">Date</th>
                            <th style="width: 500px;">Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="logbook : ${logbooks}">
                            <td th:text="${logbook.Date}"></td>
                            <td th:text="${logbook.Description}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

</body>
</html>
