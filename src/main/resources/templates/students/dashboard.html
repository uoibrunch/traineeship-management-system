<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Link to Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

    <title>Student Profile</title>
</head>

<body>

<div class="container mt-5">

    <h3>Student Profile</h3>
    <hr>

    <!-- Button to create or update profile -->
    <a href="/students/showFormForUpdate" class="btn btn-primary btn-sm mb-3">
        Update Profile
    </a>

    <!-- Student profile card -->
    <div class="card mb-3">
        <div class="card-body">
            <h5 class="card-title">
                <strong>Full Name:</strong> 
                <span th:text="${student != null ? student.studentName : 'Not Set'}"></span>
            </h5>
            <p class="card-text">
                <strong>University ID:</strong> 
                <span th:text="${student != null ? student.AM : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Preferred Location:</strong> 
                <span th:text="${student != null ? student.preferredLocation : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Interests:</strong> 
                <span th:text="${student != null ? student.interests : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Skills:</strong> 
                <span th:text="${student != null ? student.skills : 'Not Set'}"></span>
            </p>
            <p class="card-text">
                <strong>Applied for Traineeship:</strong> 
                <span th:text="${student != null && student.lookingForTraineeship ? 'Yes' : 'No'}"></span>
            </p>
        </div>
    </div>
    
    <a th:href="@{/students/fillLogbook}" class="btn btn-warning btn-sm mb-3">Fill Logbook</a>
    <a th:href="@{/logout}" class="btn btn-danger btn-sm mb-3">Logout</a>

</div>

<!-- Optional: Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js" crossorigin="anonymous"></script>

</body>
</html>
