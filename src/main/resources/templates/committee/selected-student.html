<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <title>Selected Student</title>
</head>
<body>

<div class="container mt-5">
    <h3>Available Positions For This Student</h3>
    <hr>

    <!-- Student Information -->
    <div class="card p-3 mb-3">
        <p><strong>Student Name:</strong> <span th:text="${student.studentName}"></span></p>
        <p><strong>University ID:</strong> <span th:text="${student.AM}"></span></p>
        <p><strong>Preferred Location:</strong> <span th:text="${student.preferredLocation}"></span></p>
        <p><strong>Interests:</strong> <span th:text="${student.interests}"></span></p>
        <p><strong>Skills:</strong> <span th:text="${student.skills}"></span></p>
    </div>

    <!-- Search Bar for Traineeship Positions -->
    <form th:action="@{/committee/findPositions}" method="GET">
        <input type="hidden" name="studentUsername" th:value="${student.username}"/>

        <div class="form-group">
            <label for="searchStrategy">Search By:</label>
            <select id="searchStrategy" name="strategy" class="form-control">
                <option value="interests">Interests</option>
                <option value="location">Preferred Location</option>
                <option value="both">Both</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Find Positions</button>
    </form>

    <a href="/committee/showTraineeshipApplications" class="btn btn-secondary mt-3">Back to Student List</a>
</div>

</body>
</html>
