<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Traineeship Evaluations</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Evaluation Summary</h2>

       
        <div class="card mb-4" style="background-color: khaki;">
            <div class="card-body">
                <h5 class="card-title">
                    <strong>Student:</strong> 
                    <span th:text="${position.student != null ? position.student.studentName : 'Not Assigned'}"></span>
                </h5>
            </div>
        </div>

        <h3>Student Logbook</h3>
        <hr>
        <div th:if="${position.studentLogbook != null and not #lists.isEmpty(position.studentLogbook)}">
            <p><strong>Activities:</strong></p>
            <table class="table table-bordered">
                <thead class="thead-dark">
                    <tr>
                        <th style="width: 150px; text-align: center;">Date</th>
                        <th style="width: 500px;">Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="logbook : ${position.studentLogbook}">
                        <td th:text="${logbook.date}"></td>
                        <td th:text="${logbook.description}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:each="evaluation : ${position.evaluations}">
           
            <div th:if="${evaluation.evaluationType.name() == 'COMPANY'}" class="mb-5">
                <h4 class="text-primary">Company Evaluation</h4>
                
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">
                            <strong>Company Name:</strong> 
                            <span th:text="${position.company.companyName}"></span>
                        </h5>
                    </div>
                </div>

                
                <table class="table">
                    <thead>
                        <tr>
                            <th>Motivation</th>
                            <th>Effectiveness</th>
                            <th>Efficiency</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td th:text="${evaluation.motivation}"></td>
                            <td th:text="${evaluation.effectiveness}"></td>
                            <td th:text="${evaluation.efficiency}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            
            <div th:if="${evaluation.evaluationType.name() == 'PROFESSOR'}" class="mb-5">
                <h4 class="text-success">Professor Evaluation</h4>
                
               
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">
                            <strong>Professor:</strong> 
                            <span th:text="${position.supervisor != null ? position.supervisor.professorName : 'Not Assigned'}"></span>
                        </h5>
                    </div>
                </div>


                <table class="table">
                    <thead>
                        <tr>
                            <th>Motivation</th>
                            <th>Effectiveness</th>
                            <th>Efficiency</th>
                            <th>Facility</th>
                            <th>Guidance</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td th:text="${evaluation.motivation}"></td>
                            <td th:text="${evaluation.effectiveness}"></td>
                            <td th:text="${evaluation.efficiency}"></td>
                            <td th:text="${evaluation.facility}"></td>
                            <td th:text="${evaluation.guidance}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
       
        <div class="d-flex justify-content-center mb-4">
            <form th:action="@{/committee/updateGrade/{id}(id=${position.traineeshipId})}" method="post" class="mr-3">
                <button type="submit" class="btn btn-success btn-lg custom-btn" name="grade" value="true">Pass</button>
            </form>
            <form th:action="@{/committee/updateGrade/{id}(id=${position.traineeshipId})}" method="post">
                <button type="submit" class="btn btn-danger btn-lg custom-btn" name="grade" value="false">Fail</button>
            </form>
        </div>
        
        <style>
            .custom-btn {
                font-size: 20px;
                padding: 15px 30px;
                width: 300px;
            }
        </style>
        



        <a href="/committee/dashboard" class="btn btn-primary btn-lg">Back to Dashboard</a>
    </div>
</body>
</html>
