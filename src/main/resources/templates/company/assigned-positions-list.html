<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <title>Assigned Positions</title>
</head>
<body>

<div class="container mt-5">
    <h3>Assigned Traineeship Positions</h3>
    <hr>

    <div th:if="${assignedPositions != null and assignedPositions.size() > 0}">
        <table class="table">
            <thead>
                <tr>
                    <th>Position Title</th>
                    <th>Description</th>
                    <th>From Date</th>
                    <th>To Date</th>
                    <th>Student</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="position : ${assignedPositions}">
                    <td th:text="${position.title}"></td>
                    <td th:text="${position.description}"></td>
                    <td th:text="${position.fromDate}"></td>
                    <td th:text="${position.toDate}"></td>
                    <td th:text="${position.student != null ? position.student.studentName : 'N/A'}"></td>
                    <td>
                        <a th:href="@{/company/selectPosition(positionId=${position.Id})}"
                            class="btn btn-info btn-sm">
                            Evaluate
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div th:if="${assignedPositions == null or assignedPositions.size() == 0}">
        <p>No assigned positions available.</p>
    </div>

    <a href="/company/dashboard" class="btn btn-primary btn-sm">Back to Dashboard</a>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js"></script>
</body>
</html>
