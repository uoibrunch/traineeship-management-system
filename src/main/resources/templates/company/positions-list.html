<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <title>Available Positions</title>
</head>
<body>

<div class="container mt-5">
    <h3>Available Positions</h3>
    <hr>

    <table class="table table-bordered">
        <thead class="thead-dark">
            <tr>
                <th>Position Title</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Description</th>
                <th>Skills</th>
                <th>Topics of Interest</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="position : ${positions}">
                <td th:text="${position.title}"></td>
                <td th:text="${position.fromDate}"></td>
                <td th:text="${position.toDate}"></td>
                <td th:text="${position.description}"></td>
                <td th:text="${position.skills}"></td>
                <td th:text="${position.topics}"></td>
                <td>
                    <a th:href="@{/company/delete(positionId=${position.id})}"
                        class="btn btn-danger btn-sm" 
                        onclick="if (!(confirm('Are you sure you want to delete this employee?'))) return false">
                        Delete
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <a href="/company/retrieveProfile" class="btn btn-secondary mt-3">Back to Company Profile</a>
</div>

</body>
</html>
