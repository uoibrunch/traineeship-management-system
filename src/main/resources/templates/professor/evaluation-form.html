<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evaluate Traineeship</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
        <div class="text-bg-success p-3">
            <div class="card mb-3" style = "background-color: khaki; margin-left:-15px">
                <div class="card-body">     
                    <h5 class="card-title">
                        <strong>Student's Full Name:</strong> 
                        <span th:text="${student != null ? student.studentName : 'Not Set'}"></span>
                    </h5>
                </div>
            </div>
    </div>

    <div class="card mb-3">
        <div class="card-body" style = "background-color: lightsalmon">
            <h5 class="card-title">
                <strong>Company Name:</strong> 
                <span th:text="${company != null ? company.companyName : 'Not Set'}"></span>
            </h5>
            <p class="card-text">
                <strong>Location:</strong> 
                <span th:text="${company != null ? company.companyLocation : 'Not Set'}"></span>
            </p>
        </div>
    </div>

    <!-- Logbook Section -->
    <h3>Student Logbook</h3>
    <hr>
    <div th:if="${student.assignedTraineeship.studentLogbook != null and not #lists.isEmpty(logbooks)}"> 
        <p><strong>Activities:</strong></p>
        <table class="table table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th style="width: 150px; text-align: center;">Date</th>
                    <th style="width: 500px;">Description</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="logbook : ${logbooks}">
                    <td th:text="${logbook.date}"></td>
                    <td th:text="${logbook.description}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Evaluation Form -->
    <h3 class="mt-4">Evaluate Traineeship</h3>
    <hr>
    <form th:action="@{/professor/saveEvaluation}" method="post" th:object="${evaluation}">
        <input type="hidden" name="positionId" th:value="${position.traineeshipId}"/>

        <div class="form-group">
            <label>Student Motivation</label>
            <select class="form-control" th:field="*{motivation}" required>
                <option value="1">1 - Bad</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 - Perfect</option>
            </select>
        </div>

        <div class="form-group">
            <label>Student Effectiveness</label>
            <select class="form-control" th:field="*{effectiveness}" required>
                <option value="1">1 - Bad</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 - Perfect</option>
            </select>
        </div>

        <div class="form-group">
            <label>Student Efficiency</label>
            <select class="form-control" th:field="*{efficiency}" required>
                <option value="1">1 - Bad</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 - Perfect</option>
            </select>
        </div>

        <div class="form-group">
            <label>Company Facilities</label>
            <select class="form-control" th:field="*{facility}" required>
                <option value="1">1 - Bad</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 - Perfect</option>
            </select>
        </div>

        <div class="form-group">
            <label>Company Guidance</label>
            <select class="form-control" th:field="*{guidance}" required>
                <option value="1">1 - Bad</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 - Perfect</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Submit Evaluation</button>
        <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
    </form>
</div>
</body>
</html>
